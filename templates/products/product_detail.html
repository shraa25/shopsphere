{% extends "base.html" %}

{% block content %}

<div class="row">

    <div class="col-md-6">

        <img src="{{ product.image.url }}"
             class="img-fluid rounded">

    </div>

    <div class="col-md-6">

        <h2>{{ product.name }}</h2>

        <h3 class="text-success">
            ₹{{ product.price }}
        </h3>

        <p>
            {{ product.description }}
        </p>

        <p>
            Stock : {{ product.stock }}
        </p>

        {% if product.is_available %}

        <span class="badge bg-success">
            In Stock
        </span>

        {% else %}

        <span class="badge bg-danger">
            Out of Stock
        </span>

        {% endif %}

    </div>

</div>

{% endblock %}
